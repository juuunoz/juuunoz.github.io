name: Deploy to DigitalOcean Droplet
'on':
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
              # pull files
              if [ ! -d ~/deploy/build ]; then
              git clone git@github.com:juuunoz/juuunoz.github.io ~/deploy/build
              fi
              
              cd ~/deploy/build
              git pull
              cd frontend
              npm install
              npm run build

              # build and serve frontend
              cd ~/deploy/build/frontend
              npm install
              npm run build
              rm -rf /var/www/junozhang.com/*
              cp -r dist/* /var/www/junozhang.com/
              chmod -R 755 /var/www/junozhang.com
              rm -rf ~/deploy/build/frontend
              
              echo 'Deployment to junozhang.com finished'
