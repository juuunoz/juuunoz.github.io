name: Deploy to DigitalOcean Droplet
'on':
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            export NVM_DIR=~/.nvm
            source ~/.nvm/nvm.sh

            rm -rf /tmp/build
            git clone git@github.com:juuunoz/juuunoz.github.io /tmp/build
            cd /tmp/build

            npm install
            npm run build

            sudo rm -rf /var/www/junozhang.com/*
            sudo cp -r dist/* /var/www/junozhang.com/

            sudo chown -R www-data:www-data /var/www/junozhang.com
            sudo chmod -R 755 /var/www/junozhang.com

            rm -rf /tmp/build

            echo 'Deployment to junozhang.com finished'
